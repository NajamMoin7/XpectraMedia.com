<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" role="img" aria-label="Relaxed Denim Trousers">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0b1119"/>
      <stop offset="100%" stop-color="#05080d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="78%" r="62%">
      <stop offset="0%" stop-color="#1e90ff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#1e90ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#1e90ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloth" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#525d71"/>
      <stop offset="46%" stop-color="#1b2a44"/>
      <stop offset="100%" stop-color="#111b2c"/>
    </linearGradient>
    <linearGradient id="clothAlt" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#162238"/>
      <stop offset="100%" stop-color="#323f57"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="#1e90ff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="900" height="1200" fill="url(#bg)"/>
  
  <rect width="900" height="1200" fill="url(#glow)"/>
  <ellipse cx="450" cy="1085" rx="290" ry="46" fill="#000000" opacity="0.5"/>
  <g>
  <g filter="url(#soft)">
    <path d="M322 300 L578 300 L606 1040 L486 1040 L450 660 L414 1040 L294 1040 Z"
      fill="url(#cloth)" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M322 300 L578 300 L606 1040 L486 1040 L450 660 L414 1040 L294 1040 Z"
      fill="url(#sheen)"/>
    <rect x="318" y="292" width="264" height="62" rx="12" fill="url(#clothAlt)" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linejoin="round"/>
    <line x1="450" y1="354" x2="450" y2="654" stroke="rgba(0,0,0,0.30)" stroke-width="4"/>
    <path d="M368 420 L340 470 L368 520" fill="none" stroke="rgba(0,0,0,0.20)" stroke-width="5"/>
    <path d="M532 420 L560 470 L532 520" fill="none" stroke="rgba(0,0,0,0.20)" stroke-width="5"/>
    <path d="M380 700 Q372 870 366 1030" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="6"/>
    <path d="M520 700 Q528 870 534 1030" fill="none" stroke="rgba(0,0,0,0.20)" stroke-width="7"/>
    
  </g></g>
