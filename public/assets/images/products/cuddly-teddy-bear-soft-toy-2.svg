<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" role="img" aria-label="Cuddly Teddy Bear Soft Toy">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#101826"/>
      <stop offset="100%" stop-color="#070b12"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#1e90ff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#1e90ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#1e90ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloth" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#f3eadd"/>
      <stop offset="46%" stop-color="#efe4d2"/>
      <stop offset="100%" stop-color="#999286"/>
    </linearGradient>
    <linearGradient id="clothAlt" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#c4bbac"/>
      <stop offset="100%" stop-color="#f1e7d7"/>
