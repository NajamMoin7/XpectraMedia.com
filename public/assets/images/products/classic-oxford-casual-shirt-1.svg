<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" role="img" aria-label="Classic Oxford Casual Shirt">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0b1119"/>
      <stop offset="100%" stop-color="#05080d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="78%" r="62%">
      <stop offset="0%" stop-color="#1e90ff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#1e90ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#1e90ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloth" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#f7f8fa"/>
      <stop offset="46%" stop-color="#f4f6f8"/>
      <stop offset="100%" stop-color="#9c9d9f"/>
    </linearGradient>
    <linearGradient id="clothAlt" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#c8cacb"/>
      <stop offset="100%" stop-color="#f5f7f9"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="#1e90ff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="900" height="1200" fill="url(#bg)"/>
  
  <rect width="900" height="1200" fill="url(#glow)"/>
  <ellipse cx="450" cy="1085" rx="290" ry="46" fill="#000000" opacity="0.5"/>
  <g>
  <g filter="url(#soft)">
    <path d="M360 250 L300 262 L215 340 L245 585 L330 572 L318 856 Q450 886 582 856 L570 572 L655 585 L685 340 L600 262 L540 250 L450 336 Z" fill="url(#cloth)" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M360 250 L300 262 L215 340 L245 585 L330 572 L318 856 Q450 886 582 856 L570 572 L655 585 L685 340 L600 262 L540 250 L450 336 Z" fill="url(#sheen)"/>

    <!-- armhole seams -->
    <path d="M332 566 Q344 380 352 258" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="5"/>
    <path d="M568 566 Q556 380 548 258" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="5"/>

    <!-- cuffs -->
    <path d="M245 585 L330 572 L336 528 L251 541 Z" fill="url(#clothAlt)" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M655 585 L570 572 L564 528 L649 541 Z" fill="url(#clothAlt)" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linejoin="round"/>

    <path d="M360 250 L450 336 L414 240 Z" fill="url(#clothAlt)" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linejoin="round"/>
           <path d="M540 250 L450 336 L486 240 Z" fill="url(#clothAlt)" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linejoin="round"/>

    <!-- placket and buttons -->
    <rect x="432" y="336" width="36" height="520" fill="rgba(255,255,255,0.05)"/>
    <line x1="450" y1="336" x2="450" y2="856" stroke="rgba(0,0,0,0.32)" stroke-width="4"/>
    <circle cx="450" cy="404" r="9" fill="rgba(255,255,255,0.6)"/><circle cx="450" cy="496" r="9" fill="rgba(255,255,255,0.6)"/><circle cx="450" cy="588" r="9" fill="rgba(255,255,255,0.6)"/><circle cx="450" cy="680" r="9" fill="rgba(255,255,255,0.6)"/><circle cx="450" cy="772" r="9" fill="rgba(255,255,255,0.6)"/>

    <path d="M330 430 h96 v82 l-48 22 -48 -22 Z" fill="rgba(0,0,0,0.14)" stroke="rgba(255,255,255,0.10)" stroke-width="3"/>

    <!-- fabric folds -->
    <path d="M356 620 Q368 740 360 836" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="6"/>
    <path d="M544 620 Q532 740 540 836" fill="none" stroke="rgba(0,0,0,0.20)" stroke-width="7"/>
  </g></g>
</svg>