<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700" role="img" aria-label="Trousers">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0b1119"/>
      <stop offset="100%" stop-color="#05080d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="62%">
